<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DPDP 2023 Consent Management System - Full Presentation</title>
    
    <!-- Premium Typography -->
    <link href="https://api.fontshare.com/v2/css?f[]=satoshi@900,700,500,400&f[]=clash-display@600,700&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg-deep: #000000;
            --brand-cyan: #06b6d4;
            --brand-blue: #3b82f6;
            --ui-glass: rgba(15, 23, 42, 0.6);
            --transition-speed: 0.6s;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body, html {
            width: 100%;
            height: 100%;
            background: var(--bg-deep);
            color: #fff;
            font-family: 'Satoshi', sans-serif;
            overflow: hidden;
        }

        /* ===========================================
           PRESENTATION STAGE
           =========================================== */
        .presentation-deck {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .slide-container {
            position: absolute;
            inset: 0;
            opacity: 0;
            visibility: hidden;
            transition: opacity var(--transition-speed) cubic-bezier(0.4, 0, 0.2, 1),
                        transform var(--transition-speed) cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 1;
            transform: scale(1.05);
        }

        .slide-container.active {
            opacity: 1;
            visibility: visible;
            z-index: 10;
            transform: scale(1);
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }

        /* ===========================================
           NAVIGATION UI
           =========================================== */
        .nav-overlay {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            display: flex;
            align-items: center;
            gap: 20px;
            background: var(--ui-glass);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 12px 30px;
            border-radius: 100px;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        body:hover .nav-overlay { opacity: 1; }

        .slide-counter {
            font-family: 'Clash Display', sans-serif;
            font-size: 18px;
            font-weight: 700;
            color: var(--brand-cyan);
            min-width: 80px;
            text-align: center;
        }

        .nav-btn {
            background: rgba(255,255,255,0.1);
            border: none;
            color: #fff;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            font-size: 20px;
        }

        .nav-btn:hover {
            background: var(--brand-blue);
            transform: scale(1.1);
        }

        /* Progress Bar */
        .progress-container {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: rgba(255,255,255,0.05);
            z-index: 1001;
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--brand-blue), var(--brand-cyan));
            transition: width 0.3s ease;
            box-shadow: 0 0 15px var(--brand-cyan);
        }

        /* Keyboard Hint */
        .hint {
            position: fixed;
            top: 20px;
            right: 20px;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 800;
            color: rgba(255,255,255,0.3);
            z-index: 1000;
            pointer-events: none;
        }

    </style>
</head>
<body>

    <div class="hint">Use Arrow Keys to Navigate</div>

    <div class="presentation-deck" id="deck">
        <!-- Slides will be injected here -->
    </div>

    <div class="nav-overlay">
        <button class="nav-btn" onclick="prevSlide()">‹</button>
        <div class="slide-counter" id="counter">1 / 19</div>
        <button class="nav-btn" onclick="nextSlide()">›</button>
    </div>

    <div class="progress-container">
        <div class="progress-bar" id="progressBar"></div>
    </div>

    <script>
        const totalSlides = 19;
        let currentSlide = 1;
        const deck = document.getElementById('deck');
        const counter = document.getElementById('counter');
        const progressBar = document.getElementById('progressBar');

        // 1. Initialize Slides (Create Iframes)
        function initSlides() {
            for (let i = 1; i <= totalSlides; i++) {
                const container = document.createElement('div');
                container.className = `slide-container ${i === 1 ? 'active' : ''}`;
                container.id = `slide-${i}`;
                
                const iframe = document.createElement('iframe');
                iframe.src = `slide${i}.html`;
                iframe.loading = "lazy"; // Optimize loading
                
                container.appendChild(iframe);
                deck.appendChild(container);
            }
            updateUI();
        }

        // 2. Navigation Logic
        function goToSlide(n) {
            if (n < 1 || n > totalSlides) return;
            
            // Remove active from previous
            document.querySelector('.slide-container.active').classList.remove('active');
            
            // Set active to current
            currentSlide = n;
            const newSlide = document.getElementById(`slide-${currentSlide}`);
            newSlide.classList.add('active');
            
            updateUI();
        }

        function nextSlide() {
            if (currentSlide < totalSlides) goToSlide(currentSlide + 1);
        }

        function prevSlide() {
            if (currentSlide > 1) goToSlide(currentSlide - 1);
        }

        // 3. UI Updates
        function updateUI() {
            counter.innerText = `${currentSlide} / ${totalSlides}`;
            const progress = (currentSlide / totalSlides) * 100;
            progressBar.style.width = `${progress}%`;
        }

        // 4. Event Listeners
        window.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight' || e.key === ' ' || e.key === 'PageDown') {
                nextSlide();
            }
            if (e.key === 'ArrowLeft' || e.key === 'PageUp') {
                prevSlide();
            }
        });

        // Initialize on load
        window.addEventListener('load', initSlides);
    </script>
</body>
</html>
