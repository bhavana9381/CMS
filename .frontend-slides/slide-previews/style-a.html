<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Style Preview A: Neon Cyber</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root {
            --stage-bg: #050810;
            --slide-bg: #050810;
            --accent-cyan: #00f3ff;
            --accent-magenta: #ff00ff;
            --text-primary: #ffffff;
            --ease-out-expo: cubic-bezier(0.19, 1, 0.22, 1);
        }

        /* Viewport Base Styles (Inlined) */
        html, body { width: 100%; height: 100%; margin: 0; overflow: hidden; background: var(--stage-bg); font-family: 'Space Grotesk', sans-serif; color: var(--text-primary); }
        .deck-viewport { position: fixed; inset: 0; overflow: hidden; background: var(--stage-bg); }
        .deck-stage { position: absolute; left: 0; top: 0; width: 1920px; height: 1080px; overflow: hidden; transform-origin: 0 0; background: var(--slide-bg); }
        .slide { position: absolute; inset: 0; width: 1920px; height: 1080px; overflow: hidden; display: block; visibility: visible; opacity: 1; background: var(--slide-bg); }

        /* Neon Cyber Specifics */
        .slide {
            background: 
                radial-gradient(circle at 20% 30%, rgba(0, 243, 255, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(255, 0, 255, 0.15) 0%, transparent 50%),
                #050810;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .grid-bg {
            position: absolute;
            inset: 0;
            background-image: 
                linear-gradient(rgba(0, 243, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 243, 255, 0.05) 1px, transparent 1px);
            background-size: 60px 60px;
            pointer-events: none;
        }

        .content {
            text-align: center;
            z-index: 10;
            max-width: 1400px;
        }

        .kicker {
            font-family: 'JetBrains Mono', monospace;
            color: var(--accent-cyan);
            text-transform: uppercase;
            letter-spacing: 0.5em;
            font-size: 24px;
            margin-bottom: 40px;
            opacity: 0;
            transform: translateY(20px);
            animation: reveal 0.8s var(--ease-out-expo) forwards;
        }

        h1 {
            font-size: 110px;
            font-weight: 700;
            margin: 0;
            line-height: 1.1;
            background: linear-gradient(to bottom, #fff, #888);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            opacity: 0;
            transform: translateY(30px);
            animation: reveal 0.8s var(--ease-out-expo) 0.2s forwards;
        }

        .subtitle {
            font-size: 32px;
            color: rgba(255, 255, 255, 0.6);
            margin-top: 40px;
            opacity: 0;
            transform: translateY(20px);
            animation: reveal 0.8s var(--ease-out-expo) 0.4s forwards;
        }

        .neon-bar {
            width: 200px;
            height: 4px;
            background: var(--accent-cyan);
            box-shadow: 0 0 20px var(--accent-cyan);
            margin: 60px auto;
            opacity: 0;
            transform: scaleX(0);
            animation: scaleReveal 1s var(--ease-out-expo) 0.6s forwards;
        }

        @keyframes reveal {
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes scaleReveal {
            to { opacity: 1; transform: scaleX(1); }
        }
    </style>
</head>
<body>
    <div class="deck-viewport">
        <div class="deck-stage" id="stage">
            <div class="slide">
                <div class="grid-bg"></div>
                <div class="content">
                    <div class="kicker">Future of Compliance</div>
                    <h1>Consent Management<br>System (CMS)</h1>
                    <div class="neon-bar"></div>
                    <div class="subtitle">Under the Digital Personal Data Protection Act (DPDP) 2023</div>
                </div>
            </div>
        </div>
    </div>
    <script>
        function scaleStage() {
            const stage = document.getElementById('stage');
            const scale = Math.min(window.innerWidth / 1920, window.innerHeight / 1080);
            stage.style.transform = `translate(${(window.innerWidth - 1920 * scale) / 2}px, ${(window.innerHeight - 1080 * scale) / 2}px) scale(${scale})`;
        }
        window.addEventListener('resize', scaleStage);
        scaleStage();
    </script>
</body>
</html>
